<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#10b981" opacity="0.3"/>
  <circle cx="1100" cy="530" r="100" fill="#10b981" opacity="0.2"/>
  
  <!-- Solar panel grid pattern -->
  <g opacity="0.15">
    <rect x="800" y="50" width="40" height="40" fill="white"/>
    <rect x="860" y="50" width="40" height="40" fill="white"/>
    <rect x="920" y="50" width="40" height="40" fill="white"/>
    <rect x="800" y="110" width="40" height="40" fill="white"/>
    <rect x="860" y="110" width="40" height="40" fill="white"/>
    <rect x="920" y="110" width="40" height="40" fill="white"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="280" font-size="72" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">
    RenewableZmart
  </text>
  
  <text x="600" y="350" font-size="36" fill="#d1fae5" text-anchor="middle" font-family="Arial, sans-serif">
    Renewable Energy Solutions for Africa
  </text>
  
  <!-- Decorative line -->
  <line x1="300" y1="400" x2="900" y2="400" stroke="#10b981" stroke-width="3"/>
</svg>
