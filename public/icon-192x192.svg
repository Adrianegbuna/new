<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" fill="#059669"/>
  
  <!-- Solar panel shape -->
  <g transform="translate(96, 96)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#10b981" stroke-width="3"/>
    
    <!-- Solar cells grid -->
    <rect x="-40" y="-40" width="25" height="25" fill="#ffffff" opacity="0.9"/>
    <rect x="-10" y="-40" width="25" height="25" fill="#ffffff" opacity="0.9"/>
    <rect x="20" y="-40" width="25" height="25" fill="#ffffff" opacity="0.9"/>
    
    <rect x="-40" y="-10" width="25" height="25" fill="#ffffff" opacity="0.9"/>
    <rect x="-10" y="-10" width="25" height="25" fill="#ffffff" opacity="0.9"/>
    <rect x="20" y="-10" width="25" height="25" fill="#ffffff" opacity="0.9"/>
    
    <rect x="-40" y="20" width="25" height="25" fill="#ffffff" opacity="0.9"/>
    <rect x="-10" y="20" width="25" height="25" fill="#ffffff" opacity="0.9"/>
    <rect x="20" y="20" width="25" height="25" fill="#ffffff" opacity="0.9"/>
    
    <!-- Sun rays -->
    <line x1="0" y1="-75" x2="0" y2="-85" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="53" y1="-53" x2="60" y2="-60" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="75" y1="0" x2="85" y2="0" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="53" y1="53" x2="60" y2="60" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
